<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDiT — datakatalog för elkraftsystem</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="wrap topbar">
  <div class="langtoggle">
    <a href="../index.html">EN</a>
    <a href="index.html" aria-current="true">SV</a>
  </div>
</div>
<header class="site"><div class="wrap">
  <div class="brand">
    <h1>EDiT</h1>
    <span class="full">Elsystemets digitala tvilling</span>
  </div>
  <p class="tagline" id="tagline"></p>
  <div class="partners">
    <b id="partnerLead"></b>
    <span id="pills"></span>
  </div>
</div></header>

<main><div class="wrap">
  <div class="demo-note" id="demoNote"></div>
  <div class="controls" id="controls">
    <button class="filter" data-f="all" aria-pressed="true"> <span class="n" id="n-all">·</span></button>
    <button class="filter" data-f="house" aria-pressed="false"> <span class="n" id="n-house">·</span></button>
    <button class="filter" data-f="linked" aria-pressed="false"> <span class="n" id="n-linked">·</span></button>
    <button class="filter" data-f="contributed" aria-pressed="false"> <span class="n" id="n-contributed">·</span></button>
    <span class="count" id="shown"></span>
  </div>
  <div id="cards"></div>
</div></main>

<footer><div class="wrap"><span id="siteFooter"></span></div></footer>

<script>window.EDIT_LANG="sv";window.EDIT_BASE="../";</script>
<script src="../assets/catalog.js"></script>
</body>
</html>
