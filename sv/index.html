<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDiT — katalog för data och kod</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<div class="wrap topbar">
  <div class="langtoggle">
    <a href="../index.html">EN</a>
    <a href="index.html" aria-current="true">SV</a>
  </div>
</div>
<header class="site"><div class="wrap">
  <div class="brand">
    <h1>EDiT</h1>
    <span class="full">Elsystemets digitala tvilling</span>
  </div>
  <p class="tagline" id="tagline"></p>
  <div class="partners">
    <b id="partnerLead"></b>
    <span id="pills"></span>
  </div>
</div></header>

<div class="wrap">
  <div class="tabs">
    <button class="tab" id="tab-data" aria-current="true"></button>
    <button class="tab" id="tab-code" aria-current="false"></button>
  </div>
</div>

<main><div class="wrap">
  <section id="view-data">
    <div class="controls" id="controls-data"></div>
    <div id="cards-data"></div>
  </section>
  <section id="view-code" style="display:none">
    <div class="controls" id="controls-code"></div>
    <div id="cards-code"></div>
  </section>
</div></main>

<footer><div class="wrap"><span id="siteFooter"></span></div></footer>

<script>window.EDIT_LANG="sv";window.EDIT_BASE="../";</script>
<script src="../assets/catalog.js"></script>
</body>
</html>
